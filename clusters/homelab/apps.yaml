apiVersion: kustomize.toolkit.fluxcd.io/v1 # FluxCD kustomize-controller
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps # Path to the directory containing the kustomization.yaml file to be applied
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: infrastructure